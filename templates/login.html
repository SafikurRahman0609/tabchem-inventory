{% extends "base.html" %}

{% block title %}Login - TabChem Pharma{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center mt-5">
    <div class="col-md-5">
        <div class="card shadow-lg border-0 rounded-4 mt-5">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <h2 class="fw-bold mb-1" style="letter-spacing: -1px;">Employee Login</h2>
                    <p class="text-muted">Sign in to access the TabChem System.</p>
                </div>

                <form method="POST" action="{{ url_for('login') }}">
                    <div class="mb-4">
                        <label for="username" class="form-label fw-bold small text-uppercase" style="letter-spacing: 0.5px;">Username</label>
                        <input type="text" class="form-control form-control-lg bg-light" id="username" name="username" placeholder="Enter username" required autocomplete="off">
                    </div>
                    <div class="mb-4">
                        <label for="password" class="form-label fw-bold small text-uppercase" style="letter-spacing: 0.5px;">Password</label>
                        <input type="password" class="form-control form-control-lg bg-light" id="password" name="password" placeholder="Enter password" required>
                    </div>
                    <div class="d-grid mt-5">
                        <button type="submit" class="btn btn-dark btn-lg fw-bold">Sign In to Inventory</button>
                    </div>
                </form>
                
                <div class="text-center mt-4 pt-3 border-top">
                    <small class="text-muted">TabChem Pharma Internal Systems &copy; 2026</small>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
